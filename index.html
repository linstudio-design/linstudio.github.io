<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinStudio - Objects</title>
<link rel="icon" type="image/svg+xml" href="images/I2_222_2091_253.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="global.css">
  <style id="sections-styles">
/* CSS for section section:Header */
.site-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0 30px;
  }
  .main-nav {
    display: flex;
    gap: 20px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }

/* CSS for section section:Hero */
#section-hero {
    padding-bottom: 50px;
  }
  .hero-content {
    display: flex;
    flex-direction: column;
    width: 100%;
  }
  .hero-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    width: 100%;
  }
.hero-col-left {
    width: 28%;
}

.hero-col-right {
    width: 48%;
}
    .product-card {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.product-card img {
    width: 100%;
    height: auto;
    object-fit: cover;
    transition: filter 0.4s ease;
}

.product-card:hover img,
.product-card:hover video {
    filter: grayscale(100%);
}
.product-video { 
  width: 100%; 
  height: auto; 
  display: block; 
  object-fit: cover; 
}
  .product-info {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    line-height: 1.4;
    color: #000000;
  }
.quote-text {
    margin-top: 100px;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #000000;
}
  .hero-bottom {
    margin-top: 166px;
    width: 100%;
  }
  
  @media (max-width: 1024px) {
    .hero-top {
      flex-direction: column;
      gap: 60px;
    }
    .hero-col-left, .hero-col-right {
      width: 100%;
    }
    .quote-text {
      margin-top: 40px;
    }
    .hero-bottom {
      margin-top: 60px;
    }
  }

/* CSS for section section:Footer */
#section-footer {
    padding-bottom: 20px;
  }
  .site-footer {
    background-color: #463939;
    color: #ffffff;
    padding: 30px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    width: 100%;
    box-sizing: border-box;
  }
  .footer-top {
    width: 100%;
    display: flex;
    justify-content: space-between;
    margin-bottom: 33px;
  }
  .social-links {
    display: flex;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 20px;
  }
  .footer-logo {
    margin-bottom: 20px;
  }
  .footer-logo img {
    height: 60px;
    width: auto;
  }
  .footer-bottom-links {
    display: flex;
    justify-content: space-between;
    width: 100%;
  }
  
@media (max-width: 768px) {  

  .site-footer {
    padding: 30px 20px;
    display: block;
  }

  .footer-top,
  .social-links,
  .footer-bottom-links {
    display: flex;
    width: 100%;
    align-items: center;
  }

  .footer-top {
    flex-direction: row;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .social-links {
    flex-direction: row;
    justify-content: center;
    gap: 14px;
    flex-wrap: nowrap;
    min-height: 15px;
  }

  .footer-bottom-links {
    flex-direction: row;
    justify-content: center;
    gap: 14px;
    flex-wrap: nowrap;
  }

  .social-links a,
  .footer-bottom-links a {
    display: inline-block;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .footer-logo img {
    height: 45px;
  }

  .footer-logo {
    margin-bottom: 10px;
  }

}

  </style>
  <script src="global.js" defer></script>
</head>
<body>
<section id="section-header">
  <div class="container">
    <header class="site-header">
      <a href="#" class="logo">
        <img src="images/I2_222_2091_253.svg" alt="Linstudio Logo">
      </a>
<nav class="main-nav">
  <a href="https://linstudioau.square.site/s/shop">SHOP</a>
  <a href="https://linstudioau.square.site/about">About</a>
  <a href="https://linstudioau.square.site/s/cart">CART</a>
</nav>
    </header>
  </div>
</section>
<section id="section-hero">
  <div class="container hero-container">
    <div class="hero-content">
      <div class="hero-top">
        <div class="hero-col-left">
  <a href="https://linstudioau.square.site/product/presence-tray/FPXAZHSIKVVYBA4RFYGYLPYK?cs=true&cst=custom" class="product-card">

<img src="images/presence-tray.webp" alt="Presence Tray">
    <div class="product-info">
    <p>Presence Tray</p>
    <p>A$260.00</p>
  </div>

</a>

<p class="quote-text">
  Quiet objects for everyday rituals.
</p>
        </div>
        <div class="hero-col-right">
<a href="https://linstudioau.square.site/product/liminal-incense-holder/CNYXGAVAUVZWLBUZ5EBWAKYA?cs=true&cst=custom" class="product-card">
<video class="product-video" autoplay muted loop playsinline>
  <source src="images/liminal-video.mp4" type="video/mp4">
</video>
  <div class="product-info">
              <p>Liminal Incense Holder</p>
              <p>A$240.00</p>
            </div>
</a>
        </div>
      </div>
      <div class="hero-bottom">
<a href="https://linstudioau.square.site/product/fable-bookmark/TJHMMPOW5TRXHBBZ7LLSHYLO?cs=true&cst=custom" class="product-card">
<video class="product-video" autoplay muted loop playsinline>
  <source src="images/fable-video.mp4" type="video/mp4">
</video>
  <div class="product-info">
            <p>Fable Bookmark</p>
            <p>A$110.00</p>
          </div>
</a>
      </div>
    </div>
  </div>
<section id="section-footer">
  <div class="container">
    <footer class="site-footer">
      TEST FOOTER
    </footer>
  </div>
</section>
</body>
</html>
